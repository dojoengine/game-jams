name: Submission Screening

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'gj*/*.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to screen'
        required: true
        type: string

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Screen submission
        timeout-minutes: 30
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          allowed_tools: "Bash,Read,Grep,Glob,WebFetch"
          direct_prompt: |
            You are screening a Dojo Game Jam submission PR.

            First, fetch the screening instructions:
            gh api repos/${{ github.repository }}/contents/spec/SCREENING.md --jq .content | base64 -d

            Follow the screening process step by step.

            To get the submission content, run:
            gh pr diff ${{ steps.pr.outputs.number }} --repo ${{ github.repository }}

            Environment:
            - PR number: ${{ steps.pr.outputs.number }}
            - Repository: ${{ github.repository }}
